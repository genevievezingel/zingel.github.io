---
layout: default
---
<a class="brand-fixed" href="{{ '/' | relative_url }}">genevieve<span>.</span>zingel</a>
{% include theme-toggle.html %}

<main class="wrap post-wrap">
  <a href="{{ '/' | relative_url }}#thoughts" class="view-all post-back">← Back to writing</a>
  <article class="post reveal show">
    <div class="post-meta">
      <span>{{ page.date | date: "%b %Y" }}</span>
      <span>{{ page.read }}</span>
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
    {{ content }}
  </article>
</main>

<style>
  .post-wrap { max-width: 760px; padding-top: 96px; padding-bottom: 96px; }
  .post-back { margin-bottom: 36px; }
  .post-meta { display: flex; gap: 18px; font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.8rem; color: var(--muted-2); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 18px; }
  .post-title { font-size: clamp(2rem, 5vw, 2.9rem); font-weight: 300; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 34px; }
  .post p { color: var(--muted); font-size: 1.08rem; margin-bottom: 20px; }
  .post h2 { font-size: 1.5rem; font-weight: 500; letter-spacing: -0.01em; margin: 38px 0 16px; }
  .post ul, .post ol { color: var(--muted); margin: 0 0 20px 1.25rem; }
  .post li { margin-bottom: 8px; }
  .post a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  .post strong { color: var(--text); font-weight: 600; }
  .post blockquote { border-left: 2px solid var(--accent); padding: 6px 0 6px 18px; margin: 0 0 24px; color: var(--muted-2); }
  .post code { font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.9em; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 6px; padding: 1px 6px; }

  /* Code blocks — rounded panel (adapts to dark / light theme) */
  .post pre, .post .highlight {
    background: #1b2a33; border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px; padding: 24px 26px; overflow-x: auto; margin: 0 0 26px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  }
  .post .highlight pre { background: none; border: 0; border-radius: 0; padding: 0; margin: 0; box-shadow: none; }
  .post pre code, .post .highlight code {
    font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.95rem; line-height: 1.75; color: #e8eef2;
    background: none; border: 0; padding: 0; white-space: pre;
  }
  /* Rouge syntax tokens (GitHub Pages highlighter) */
  .post .highlight .c, .post .highlight .c1, .post .highlight .cm { color: #6b7e8c; font-style: italic; }
  .post .highlight .nb, .post .highlight .nf, .post .highlight .nx { color: #e8eef2; }
  .post .highlight .k, .post .highlight .kd, .post .highlight .kn, .post .highlight .kr { color: #7aa2f7; }
  .post .highlight .nv, .post .highlight .vg, .post .highlight .o, .post .highlight .ow { color: #6cc8ff; }
  .post .highlight .s, .post .highlight .s1, .post .highlight .s2, .post .highlight .se { color: #9ece6a; }
  .post .highlight .mi, .post .highlight .mf, .post .highlight .m { color: #ff9e64; }
  .post .highlight .gp { color: #6cc8ff; }   /* shell prompt */

  /* Light-mode code panel */
  body.light .post pre, body.light .post .highlight {
    background: #d7dce3; 
    /* border: 1px solid #c3c9d2; box-shadow: 0 4px 16px rgba(20,20,40,0.08); */
  }
  body.light .post pre code, body.light .post .highlight code { color: #1f2430; }
  body.light .post .highlight .c, body.light .post .highlight .c1, body.light .post .highlight .cm { color: #6e7781; }
  body.light .post .highlight .nb, body.light .post .highlight .nf, body.light .post .highlight .nx { color: #1f2430; }
  body.light .post .highlight .k, body.light .post .highlight .kd, body.light .post .highlight .kn, body.light .post .highlight .kr { color: #0550ae; }
  body.light .post .highlight .nv, body.light .post .highlight .vg, body.light .post .highlight .o, body.light .post .highlight .ow,
  body.light .post .highlight .gp { color: #0a7ea4; }
  body.light .post .highlight .s, body.light .post .highlight .s1, body.light .post .highlight .s2, body.light .post .highlight .se { color: #0a7d33; }
  body.light .post .highlight .mi, body.light .post .highlight .mf, body.light .post .highlight .m { color: #b35900; }
</style>
